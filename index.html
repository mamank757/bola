<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BPP Bola Kabupaten Wajo</title>


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:#eef3f2;
transition:0.3s;
padding-bottom:80px;
}

/* DARK MODE */

body.dark{
background:#121212;
color:white;
}

body.dark .menu-item{
background:#1e1e1e;
color:white;
}

body.dark .bottom-nav{
background:#1e1e1e;
}

body.dark .menu-item p{
color:#eee;
}

/* HEADER */

.header{
position:relative;
color:white;
text-align:center;
padding:30px 15px 50px 15px;
background-image:url("https://images.unsplash.com/photo-1500382017468-9049fed747ef");
background-size:cover;
background-position:center;
}

.header::before{
content:"";
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.5);
}

.header-content{
position:relative;
z-index:2;
}

.logo{
width:70px;
margin-bottom:10px;
}

.title{
font-size:20px;
font-weight:bold;
}

/* DARK MODE BUTTON */

.dark-toggle{
position:absolute;
top:15px;
right:15px;
z-index:3;
background:white;
border:none;
border-radius:50%;
width:40px;
height:40px;
cursor:pointer;
font-size:16px;
}

/* GRID MENU */

.menu-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
padding:20px;
margin-top:-30px;
}

.menu-grid a{
text-decoration:none;
color:inherit;
}

/* MENU ITEM */

.menu-item{
background:white;
border-radius:18px;
padding:25px 10px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
cursor:pointer;
position:relative;
overflow:hidden;
transition:0.3s;
}

.menu-item:hover{
transform:translateY(-6px);
}

/* ICON */

.icon-box{
width:55px;
height:55px;
margin:auto;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
color:white;
margin-bottom:10px;
}

/* ICON COLORS */

.profil{background:#4CAF50;}
.berita{background:#2196F3;}
.info{background:#FF9800;}
.musim{background:#00ACC1;}
.materi{background:#9C27B0;}
.eviden{background:#795548;}
.tools{background:#607D8B;}
.data{background:#3F51B5;}
.kegiatan{background:#E91E63;}

.menu-item p{
margin:0;
font-weight:600;
font-size:14px;
}

/* RIPPLE EFFECT */

.menu-item span{
position:absolute;
border-radius:50%;
transform:scale(0);
animation:ripple 600ms linear;
background:rgba(0,0,0,0.2);
}

@keyframes ripple{
to{
transform:scale(4);
opacity:0;
}
}

/* BOTTOM NAV */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:10px 0;
box-shadow:0 -3px 15px rgba(0,0,0,0.15);
}

.bottom-nav a{
text-decoration:none;
color:#777;
font-size:12px;
text-align:center;
}

.bottom-nav i{
font-size:20px;
display:block;
margin-bottom:3px;
}

.bottom-nav a.active{
color:#2e7d32;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<button class="dark-toggle" onclick="toggleDark()">
<i class="fa-solid fa-moon"></i>
</button>

<div class="header-content">

<img class="logo"
src="https://upload.wikimedia.org/wikipedia/commons/8/8a/Logo_Kementerian_Pertanian_Republik_Indonesia.svg">

<div class="title">
BPP BOLA <br>
Kabupaten Wajo, Provinsi Sulawesi Selatan
<br>Jl. Poros Lompiwi - Peneki, Kecamatan Bola 90984</br>
</div>

</div>
</div>

<!-- MENU -->

<div class="menu-grid">

<a href="https://www.bppbola.my.id/home/profil">
<div class="menu-item">
<div class="icon-box profil"><i class="fa-solid fa-id-card"></i></div>
<p>Profil BPP Bola</p>
</div>
</a>

<a href="https://www.bppbola.my.id/home/berita">
<div class="menu-item">
<div class="icon-box berita"><i class="fa-solid fa-newspaper"></i></div>
<p>Berita</p>
</div>
</a>


<a href="https://www.bppbola.my.id/home/prediksi">
<div class="menu-item">
<div class="icon-box musim"><i class="fa-solid fa-cloud-sun-rain"></i></div>
<p>Prediksi Musim</p>
</div>
</a>

<a href="https://www.bppbola.my.id/home/toools">
<div class="menu-item">
<div class="icon-box tools"><i class="fa-solid fa-screwdriver-wrench"></i></div>
<p>Tools Penyuluh</p>
</div>
</a>

<a href="https://www.bppbola.my.id/home/lcs">
<div class="menu-item">
<div class="icon-box eviden"><i class="fa-solid fa-folder-open"></i></div>
<p>Buat Eviden LCS!</p>
</div>
</a>

<a href="https://www.bppbola.my.id/home/monografi">
<div class="menu-item">
<div class="icon-box data"><i class="fa-solid fa-database"></i></div>
<p>Data Monografi</p>
</div>
</a>

<a href="https://www.bppbola.my.id/home/kegiatan">
<div class="menu-item">
<div class="icon-box kegiatan"><i class="fa-solid fa-users"></i></div>
<p>Kegiatan Penyuluh</p>
</div>
</a>


<a href="https://www.bppbola.my.id/home/informasi">
<div class="menu-item">
<div class="icon-box info"><i class="fa-solid fa-bullhorn"></i></div>
<p>Informasi</p>
</div>
</a>

<a href="https://www.bppbola.my.id/home/materi">
<div class="menu-item">
<div class="icon-box materi"><i class="fa-solid fa-book-open"></i></div>
<p>Materi</p>
</div>
</a>

</div>

<!-- BOTTOM NAVIGATION -->

<div class="bottom-nav">

<a href="#" class="active">
<i class="fa-solid fa-house"></i>
Home
</a>

<a href="https://www.bppbola.my.id/home/monografi">
<i class="fa-solid fa-chart-line"></i>
Data
</a>

<a href="https://www.bppbola.my.id/home/informasi">
<i class="fa-solid fa-bell"></i>
Info
</a>

<a href="https://www.bppbola.my.id/home/profil">
<i class="fa-solid fa-user"></i>
Akun
</a>

</div>

<script>

/* DARK MODE */

function toggleDark(){
document.body.classList.toggle("dark");
}

/* RIPPLE EFFECT */

const buttons=document.querySelectorAll(".menu-item");

buttons.forEach(btn=>{
btn.addEventListener("click",function(e){

const circle=document.createElement("span");

const diameter=Math.max(btn.clientWidth,btn.clientHeight);
const radius=diameter/2;

circle.style.width=circle.style.height=`${diameter}px`;
circle.style.left=`${e.clientX-btn.offsetLeft-radius}px`;
circle.style.top=`${e.clientY-btn.offsetTop-radius}px`;

btn.appendChild(circle);

setTimeout(()=>circle.remove(),600);

});
});

</script>

</body>
</html>
